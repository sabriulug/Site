<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İletişim | Yorgun Gençlik Merkezi</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header id="main-header" class="active">
        <nav class="container">
            <div class="logo"><a href="index.html">YORGUN<span>GENÇLİK</span></a></div>
            <ul class="nav-links">
                <li><a href="index.html">Ana Sayfa</a></li>
                <li><a href="egitimler.html">Eğitimler</a></li>
                <li><a href="iletisim.html" class="active">Başvuru</a></li>
            </ul>
        </nav>
    </header>

    <main style="padding-top: 120px;">
        <div class="container">
            <h1 class="section-title text-center">Bize Ulaşın</h1>
            <div style="max-width: 600px; margin: 0 auto; background: #f8fafc; padding: 2rem; border-radius: 20px;">
                <form>
                    <div style="margin-bottom: 1rem;">
                        <label>Adınız Soyadınız</label>
                        <input type="text" style="width: 100%; padding: 0.8rem; border: 1px solid #ddd; border-radius: 8px;">
                    </div>
                    <div style="margin-bottom: 1rem;">
                        <label>E-posta Adresiniz</label>
                        <input type="email" style="width: 100%; padding: 0.8rem; border: 1px solid #ddd; border-radius: 8px;">
                    </div>
                    <div style="margin-bottom: 1rem;">
                        <label>Mesajınız/Başvurunuz</label>
                        <textarea style="width: 100%; padding: 0.8rem; border: 1px solid #ddd; border-radius: 8px; height: 150px;"></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary" style="width: 100%;">Gönder</button>
                </form>
            </div>
        </div>
    </main>
</body>
</html>
